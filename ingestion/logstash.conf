# =============================================================================
# Logstash Configuration: E-Commerce App → Elasticsearch
#
# Receives logs from the E-Commerce web app via HTTP input,
# processes them, and forwards to Elasticsearch.
# Deploy this on the Elasticsearch VM.
# =============================================================================

input {
  http {
    port => 5044
    codec => json
  }
}

filter {
  # Remove HTTP headers added by the http input plugin
  mutate {
    remove_field => ["headers", "@version", "host"]
  }

  # Ensure timestamp field exists
  if ![timestamp] {
    ruby {
      code => "event.set('timestamp', Time.now.utc.iso8601)"
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://localhost:9200"]
    index => "infrastructure-logs"
  }

  # Debug output
  stdout {
    codec => rubydebug
  }
}
